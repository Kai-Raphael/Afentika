<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triple A Scoreboard · Afentika</title>
<style>
:root {
  --green:       #00843D;
  --green-dark:  #00582A;
  --green-light: #00A34D;
  --gold:        #F5A623;
  --blue:        #4A9EE8;
  --red:         #E84040;
  --bg:          #0C1C12;
  --bg2:         #132019;
  --bg3:         #1A2D21;
  --text:        #E6F4EC;
  --muted:       #6B9878;
  --border:      #263D2E;
  --radius:      8px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

.header {
  background: var(--green-dark);
  border-bottom: 2px solid var(--green);
  padding: 14px 24px;
  display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap;
}
.header-brand { display: flex; align-items: center; gap: 12px; }
.header-brand h1 { font-size: 1.3rem; font-weight: 700; }
.header-brand p { font-size: 0.72rem; color: var(--muted); margin-top: 2px; letter-spacing: .04em; text-transform: uppercase; }

.live-badge {
  display: flex; align-items: center; gap: 6px;
  font-size: 0.72rem; color: var(--muted); letter-spacing: .08em; text-transform: uppercase;
}
.live-dot { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

.content { padding: 24px; max-width: 900px; margin: 0 auto; }

.card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 20px; }
.card-title { font-size: 0.95rem; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
th { text-align: left; padding: 9px 12px; color: var(--muted); font-size: 0.72rem; text-transform: uppercase; letter-spacing: .06em; border-bottom: 1px solid var(--border); white-space: nowrap; }
td { padding: 11px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: var(--bg3); }

.rank { font-weight: 700; font-size: 1rem; }
.r1 { color: var(--gold); }
.r2 { color: #C0C0C0; }
.r3 { color: #CD7F32; }

.prog-outer { height: 8px; background: var(--bg3); border-radius: 4px; overflow: hidden; width: 120px; }
.prog-fill  { height: 100%; border-radius: 4px; }
.prog-row   { display: flex; align-items: center; gap: 8px; }
.prog-pct   { font-size: 0.75rem; color: var(--muted); min-width: 30px; }

.badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 99px; font-size: 0.74rem; font-weight: 600; }
.badge-ahead  { background: rgba(0,163,77,.18); color: var(--green-light); }
.badge-behind { background: rgba(232,64,64,.18); color: var(--red); }
.badge-pace   { background: rgba(245,166,35,.18); color: var(--gold); }

.empty { text-align: center; padding: 48px; color: var(--muted); font-size: 0.88rem; }

.footer-row {
  text-align: center;
  font-size: 0.72rem;
  color: var(--muted);
  padding: 1.5rem 0;
  letter-spacing: .06em;
}
.footer-row a { color: var(--green-light); text-decoration: none; }

@media (max-width: 600px) {
  .content { padding: 14px; }
  .header  { padding: 12px 16px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-brand">
    <div style="font-size:2rem;">🍺</div>
    <div>
      <h1>Triple A Scoreboard</h1>
      <p>Afentika · 24 Beers Challenge</p>
    </div>
  </div>
  <div class="live-badge">
    <div class="live-dot"></div>
    Live — vernieuwd elke 15s
  </div>
</div>

<div class="content">
  <div class="card">
    <div class="card-title">🏆 Leaderboard</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Naam</th>
            <th title="Geprojecteerd op basis van gemiddelde snelheid">~Nu</th>
            <th>🍺 Alc</th>
            <th>🥤 Non-alc</th>
            <th>vs Pace</th>
            <th>Voortgang</th>
          </tr>
        </thead>
        <tbody id="leaderboard-body">
          <tr><td colspan="7"><div class="empty">Laden...</div></td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="footer-row">
    <a href="/tripleascoreboard/app">→ Open de volledige app</a>
  </div>
</div>

<script>
function pad(n) { return String(n).padStart(2, '0'); }
function fmtHours(hrs) {
  if (hrs < 0) hrs = 0;
  const h = Math.floor(hrs); const m = Math.round((hrs - h) * 60);
  return m ? `${h}h ${m}m` : `${h}h`;
}

function personStats(id, s) {
  const snaps = s.snapshots
    .filter(e => e.personId === id)
    .sort((a, b) => new Date(a.time) - new Date(b.time));

  const eventStart = new Date(s.eventStart);
  const now        = new Date();
  const elapsedHrs = Math.max((now - eventStart) / 3600000, 0.001);

  if (!snaps.length) return { total: 0, alcohol: 0, nonAlc: 0, projectedTotal: 0, diff: 0 };

  const last    = snaps[snaps.length - 1];
  const total   = last.alcohol + last.nonAlc;
  const lastSnapHrs = Math.max((new Date(last.time) - eventStart) / 3600000, 0.001);
  const overallRate = total / lastSnapHrs;
  const projectedTotal = Math.min(overallRate * elapsedHrs, 24);
  const target  = Math.min(elapsedHrs, 24);
  const diff    = projectedTotal - target;

  return { total, alcohol: last.alcohol, nonAlc: last.nonAlc, projectedTotal, diff };
}

function render(s) {
  const tbody = document.getElementById('leaderboard-body');
  if (!s || !s.people || !s.people.length) {
    tbody.innerHTML = '<tr><td colspan="7"><div class="empty">Nog geen deelnemers</div></td></tr>';
    return;
  }

  const rows = s.people
    .map(p => ({ p, ...personStats(p.id, s) }))
    .sort((a, b) => b.projectedTotal - a.projectedTotal);

  tbody.innerHTML = rows.map(({ p, total, alcohol, nonAlc, projectedTotal, diff }, i) => {
    const rankClass = i === 0 ? 'r1' : i === 1 ? 'r2' : i === 2 ? 'r3' : '';
    const medal     = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : i + 1;
    const pct       = (total / 24) * 100;
    const alcPct    = total > 0 ? (alcohol / total) * 100 : 0;
    const fill      = `background:linear-gradient(90deg,var(--gold) ${alcPct.toFixed(1)}%,var(--blue) ${alcPct.toFixed(1)}%);width:${pct.toFixed(1)}%`;

    let badge;
    if (diff > 0.5)       badge = `<span class="badge badge-ahead">+${diff.toFixed(1)} ahead</span>`;
    else if (diff < -0.5) badge = `<span class="badge badge-behind">${diff.toFixed(1)} behind</span>`;
    else                  badge = `<span class="badge badge-pace">on pace</span>`;

    return `<tr>
      <td><span class="rank ${rankClass}">${medal}</span></td>
      <td><strong>${escHtml(p.name)}</strong></td>
      <td style="font-weight:600;color:var(--gold);">${projectedTotal.toFixed(1)}</td>
      <td>${alcohol}</td>
      <td style="color:var(--blue);">${nonAlc}</td>
      <td>${badge}</td>
      <td>
        <div class="prog-row">
          <div class="prog-outer"><div class="prog-fill" style="${fill}"></div></div>
          <span class="prog-pct">${pct.toFixed(0)}%</span>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function escHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

async function loadScores() {
  try {
    const res = await fetch('/api/sync');
    if (!res.ok) throw new Error();
    const { data } = await res.json();
    render(data);
  } catch {
    document.getElementById('leaderboard-body').innerHTML =
      '<tr><td colspan="7"><div class="empty">Kon data niet laden</div></td></tr>';
  }
}

loadScores();
setInterval(loadScores, 15000);
</script>
</body>
</html>
